name: Feature request
description: Suggest an improvement or a new capability.
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting an improvement. Clear, focused requests are easier for contributors to pick up.
  - type: textarea
    id: problem
    attributes:
      label: Problem or opportunity
      description: What user problem would this solve?
      placeholder: When recording on mobile, it is hard to...
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the smallest useful version of the feature.
      placeholder: Add a setting that...
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      description: What should be true when this is complete?
      placeholder: |
        - Users can...
        - The change works on...
        - Existing behavior remains...
    validations:
      required: false
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Optional. Mention other approaches if relevant.
    validations:
      required: false
